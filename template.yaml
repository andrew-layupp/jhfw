AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Just How Fucked Are We — Serverless deployment (API Gateway + Lambda + DynamoDB)

Globals:
  Function:
    Runtime: python3.12
    Timeout: 300
    MemorySize: 512
    Environment:
      Variables:
        TABLE_PREFIX: jhfw
        SNAPSHOTS_TABLE: !Ref SnapshotsTable
        SIGNALS_TABLE: !Ref SignalsTable
        SCRAPBOARD_TABLE: !Ref ScrapboardTable
    Layers:
      - !Ref SharedCodeLayer
      - !Ref DependencyLayer

Resources:

  # ── API Gateway HTTP API ──────────────────────────────────────────────────────
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      Description: JHFW Global Chaos Index API
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - '*'
        MaxAge: 600

  # ── Lambda Functions ──────────────────────────────────────────────────────────

  PollFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: jhfw-poll
      CodeUri: lambdas/poll/
      Handler: handler.lambda_handler
      Description: GET/POST /api/poll — community poll votes
      Timeout: 10
      MemorySize: 256
      Environment:
        Variables:
          POLL_TABLE: !Ref PollTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PollTable
      Events:
        GetPoll:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/poll
            Method: GET
        PostPoll:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/poll
            Method: POST

  ApiCurrentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: jhfw-api-current
      CodeUri: lambdas/api_current/
      Handler: handler.lambda_handler
      Description: GET /api/current — returns latest snapshot + signals from DynamoDB
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SnapshotsTable
        - DynamoDBReadPolicy:
            TableName: !Ref SignalsTable
      Events:
        GetCurrent:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/current
            Method: GET

  ApiHistoryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: jhfw-api-history
      CodeUri: lambdas/api_history/
      Handler: handler.lambda_handler
      Description: GET /api/history — returns historical snapshots (accepts ?days= param)
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SnapshotsTable
      Events:
        GetHistory:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/history
            Method: GET

  ApiHealthFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: jhfw-api-health
      CodeUri: lambdas/api_health/
      Handler: handler.lambda_handler
      Description: GET /api/health — returns status + snapshot count
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SnapshotsTable
      Events:
        GetHealth:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/health
            Method: GET

  CollectorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: jhfw-collector
      CodeUri: lambdas/collector/
      Handler: handler.lambda_handler
      Description: EventBridge-triggered every 15 min — collects data, scores, stores in DynamoDB
      Timeout: 900
      MemorySize: 1024
      Environment:
        Variables:
          FRED_API_KEY: '{{resolve:ssm:/jhfw/fred-api-key}}'
          NEWSAPI_KEY: '{{resolve:ssm:/jhfw/newsapi-key}}'
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SnapshotsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SignalsTable
      Events:
        ScheduledCollection:
          Type: Schedule
          Properties:
            Schedule: rate(15 minutes)
            Description: Collect chaos data every 15 minutes
            Enabled: true

  SeederFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: jhfw-seeder
      CodeUri: lambdas/seeder/
      Handler: handler.lambda_handler
      Description: Manually invokable — seeds 6 months of historical data into DynamoDB
      Timeout: 900
      MemorySize: 1024
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SnapshotsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SignalsTable

  AuScrapboardFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: jhfw-au-scrapboard
      CodeUri: lambdas/au_scrapboard/
      Handler: handler.lambda_handler
      Description: GET /api/au/scrapboard — Claude web search for AU chaos factors
      Timeout: 300
      MemorySize: 512
      Events:
        GetScrapboard:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/au/scrapboard
            Method: GET
        GetScrapboardFactor:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/au/scrapboard/{factor_id}
            Method: GET

  ScrapboardCacheFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: jhfw-scrapboard-cache
      CodeUri: lambdas/au_scrapboard/
      Handler: handler.cache_handler
      Description: Scheduled every 6h — runs Claude web search and caches results in DynamoDB
      Timeout: 900
      MemorySize: 1024
      Environment:
        Variables:
          CLAUDE_API_KEY: '{{resolve:ssm:/jhfw/claude-api-key}}'
          SCRAPBOARD_TABLE: !Ref ScrapboardTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ScrapboardTable
      Events:
        ScheduledRefresh:
          Type: Schedule
          Properties:
            Schedule: rate(6 hours)
            Description: Refresh AU scrapboard news cache every 6 hours
            Enabled: true

  ScrapboardReadFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: jhfw-scrapboard-read
      CodeUri: lambdas/au_scrapboard/
      Handler: handler.read_handler
      Description: GET /api/au/news — reads cached scrapboard from DynamoDB (instant)
      Timeout: 10
      MemorySize: 256
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ScrapboardTable
      Events:
        GetCachedNews:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/au/news
            Method: GET

  # ── US Scrapboard Functions ──────────────────────────────────────────────────

  UsScrapboardFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: jhfw-us-scrapboard
      CodeUri: lambdas/us_scrapboard/
      Handler: handler.lambda_handler
      Description: GET /api/us/scrapboard — Claude web search for US chaos factors
      Timeout: 300
      MemorySize: 512
      Events:
        GetScrapboard:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/us/scrapboard
            Method: GET
        GetScrapboardFactor:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/us/scrapboard/{factor_id}
            Method: GET

  UsScrapboardCacheFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: jhfw-us-scrapboard-cache
      CodeUri: lambdas/us_scrapboard/
      Handler: handler.cache_handler
      Description: Scheduled every 6h — runs Claude web search and caches US results in DynamoDB
      Timeout: 900
      MemorySize: 1024
      Environment:
        Variables:
          CLAUDE_API_KEY: '{{resolve:ssm:/jhfw/claude-api-key}}'
          US_SCRAPBOARD_TABLE: !Ref UsScrapboardTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsScrapboardTable
      Events:
        ScheduledRefresh:
          Type: Schedule
          Properties:
            Schedule: rate(6 hours)
            Description: Refresh US scrapboard news cache every 6 hours
            Enabled: true

  UsScrapboardReadFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: jhfw-us-scrapboard-read
      CodeUri: lambdas/us_scrapboard/
      Handler: handler.read_handler
      Description: GET /api/us/news — reads cached US scrapboard from DynamoDB (instant)
      Timeout: 10
      MemorySize: 256
      Environment:
        Variables:
          US_SCRAPBOARD_TABLE: !Ref UsScrapboardTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref UsScrapboardTable
      Events:
        GetCachedNews:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/us/news
            Method: GET

  # ── DynamoDB Tables ───────────────────────────────────────────────────────────

  SnapshotsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: jhfw-snapshots
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: ts
          AttributeType: S
      KeySchema:
        - AttributeName: ts
          KeyType: HASH

  SignalsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: jhfw-signals
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: ts
          AttributeType: S
        - AttributeName: text
          AttributeType: S
      KeySchema:
        - AttributeName: ts
          KeyType: HASH
        - AttributeName: text
          KeyType: RANGE

  PollTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: jhfw-poll
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: vote_id
          AttributeType: S
      KeySchema:
        - AttributeName: vote_id
          KeyType: HASH

  ScrapboardTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: jhfw-scrapboard
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: factor_id
          AttributeType: S
      KeySchema:
        - AttributeName: factor_id
          KeyType: HASH

  UsScrapboardTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: jhfw-us-scrapboard
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: factor_id
          AttributeType: S
      KeySchema:
        - AttributeName: factor_id
          KeyType: HASH

  # ── Lambda Layers ─────────────────────────────────────────────────────────────

  SharedCodeLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: jhfw-shared-code
      Description: Shared Python code — dynamo_db, scorer, collectors
      ContentUri: lambdas/shared/
      CompatibleRuntimes:
        - python3.12
    Metadata:
      BuildMethod: makefile

  DependencyLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: jhfw-dependencies
      Description: Python dependencies — yfinance, pandas, httpx
      ContentUri: lambdas/deps_layer/
      CompatibleRuntimes:
        - python3.12
    Metadata:
      BuildMethod: python3.12

# ── Outputs ───────────────────────────────────────────────────────────────────

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL — set as BACKEND_URL in Amplify
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com'
    Export:
      Name: JhfwApiUrl

  SnapshotsTableName:
    Description: DynamoDB snapshots table name
    Value: !Ref SnapshotsTable

  SignalsTableName:
    Description: DynamoDB signals table name
    Value: !Ref SignalsTable

  CollectorFunctionName:
    Description: Collector Lambda function name (for manual invocation)
    Value: !Ref CollectorFunction

  SeederFunctionName:
    Description: Seeder Lambda function name (for manual invocation)
    Value: !Ref SeederFunction
